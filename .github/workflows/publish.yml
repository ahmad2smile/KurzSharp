name: NuGet Publish

on:
  push:
    tags:
      - "*"

jobs:
  nuget-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
        env:
          NUGET_AUTH_TOKEN: ${{secrets.NUGET_TOKEN}}

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build /p:Version=$(git describe --tags)

      - name: Test with dotnet
        run: dotnet test --logger trx --results-directory "TestResults-${{ matrix.dotnet-version }}"

      - name: Upload dotnet test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-results-${{ matrix.dotnet-version }}
          path: TestResults-${{ matrix.dotnet-version }}
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}

      - name: Create the package
        run: dotnet pack --configuration Release src/KurzSharp /p:Version=$(git describe --tags)

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ahmad2smile

      - name: Publish the package
        run: |
          dotnet nuget push "src/KurzSharp/bin/Release/*.nupkg" --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
          dotnet nuget push "src/KurzSharp/bin/Release/*.nupkg" --skip-duplicate --api-key ${{secrets.GITHUB_TOKEN}} --source https://nuget.pkg.github.com/ahmad2smile/index.json

      - name: List published package on NuGet.org
        run: |
          PACKAGE_ID="KurzSharp"
          VERSION=$(git describe --tags)

          echo "Waiting for $PACKAGE_ID $VERSION to finish validation on NuGet.org..."
          for i in $(seq 1 30); do
            if curl -sf "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/index.json" 2>/dev/null | jq -e --arg v "$VERSION" '.versions | index($v)' >/dev/null 2>&1; then
              echo "Package is available."
              break
            fi
            echo "Attempt $i/30: not yet available, waiting 30s..."
            sleep 30
          done

          echo "Relisting $PACKAGE_ID $VERSION..."
          curl -X POST \
            -H "X-NuGet-ApiKey: ${{ steps.login.outputs.NUGET_API_KEY }}" \
            --fail --show-error --silent \
            "https://www.nuget.org/api/v2/package/${PACKAGE_ID}/${VERSION}"
          echo "Done."
